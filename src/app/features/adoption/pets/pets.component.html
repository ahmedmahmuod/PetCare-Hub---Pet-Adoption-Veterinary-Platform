<div class="mt-12">
    <app-page-title [title]="title | translate"></app-page-title>
    <div class="container mx-auto">
        <!-- Filters Sidebar -->
        <app-pet-filter (filterChange)="onFilterChange($event)"></app-pet-filter>     
        
        @if (loading()) {
            <app-adoption-skeleton />
        } @else {
            @if ((filteredPets$ | async)?.length === 0) {
                <h1 class="text-brand-color text-center text-4xl m-4">{{'Pages.Adoption.Filter.Empty' | translate}}</h1>
            } @else {
                <app-card-adoption [items]="(filteredPets$ | async) ?? []"></app-card-adoption>
            }
        }
    </div>
</div>
